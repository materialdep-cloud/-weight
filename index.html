<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>重量扣重計算</title>

<link rel="manifest" href="manifest.json">

<style>
body { margin:0; font-family:Arial; background:#f0f2f5; }
.header { background:#2e7d32; color:#fff; padding:15px; text-align:center; font-size:20px; }
.container { padding:10px; }

.card {
    background:#fff;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.card.active { background:#e0e0e0; }

.title { font-size:18px; margin-bottom:5px; }

.row {
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    margin-bottom:5px;
}
.row input {
    flex:1 1 45%;
    min-width:120px;
}

@media (max-width:600px){
    .row input { flex:1 1 100%; }
}

input { padding:6px; font-size:16px; }

.result { color:green; font-weight:bold; }

.delete-btn {
    color:red;
    font-size:14px;
    margin-top:5px;
}

.add-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin:10px;
}

.fab-copy, .fab-clear{
    position:fixed;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:24px;
    z-index:9999;
}

.fab-copy { bottom:20px; background:#2e7d32; }
.fab-clear { bottom:90px; background:#d32f2f; }

</style>
</head>

<body>

<div class="header">📦 重量扣重計算</div>

<div class="container" id="app"></div>

<div class="add-box">
    品名 <input id="name">
    箱重 <input id="tare" type="number">
    <button onclick="add()">➕新增</button>
</div>

<div class="fab-clear" onclick="clearData()">🗑</div>
<div class="fab-copy" onclick="copy()">📋</div>

<script>

const PALLET = 8.2;

let defaultItems = [
{name:"歐式生菜", icon:"🥬✨", tare:1.8},
{name:"日本山藥(無填充物)", icon:"🥔", tare:0.73},
{name:"豆苗", icon:"🌿", tare:1.2},
{name:"苜蓿", icon:"🌱", tare:0.89},
{name:"興家洋菇", icon:"🍄", tare:0.65},
{name:"本產美生菜", icon:"🥬", tare:1.45},
{name:"本產蘿美(牛皮紙箱)", icon:"🥬", tare:1.51},
{name:"本產蘿美(白箱)", icon:"🥬", tare:1.42},
{name:"進口美生菜", icon:"📦🥬", tare:1.22},
{name:"進口蘿美(大包)", icon:"📦🥬", tare:1.06},
{name:"進口蘿美(小包)", icon:"📦🥬", tare:1.51},
{name:"小黃瓜/番茄黑苔", icon:"🥒🍅", tare:1.55},
{name:"辣椒", icon:"🌶️", tare:1.2},
{name:"櫛瓜", icon:"🥒", tare:0.84},
{name:"日本紅春香地瓜", icon:"🍠", tare:0.45},
{name:"日本大蔥", icon:"🧅", tare:0.45}
];

let savedItems = JSON.parse(localStorage.getItem("customItems")) || [];
let items = [...defaultItems, ...savedItems];

let data = JSON.parse(localStorage.getItem("data")) || {};

function save(){
    localStorage.setItem("customItems", JSON.stringify(savedItems));
    localStorage.setItem("data", JSON.stringify(data));
}

function render(){
    const app = document.getElementById("app");
    app.innerHTML = "";

    items.forEach((item,i)=>{
        const d = data[i] || {};

        const div = document.createElement("div");
        div.className = "card";
        div.id = "card"+i;

        let isCustom = i >= defaultItems.length;

        div.innerHTML = `
        <div class="title">${item.icon||""} ${item.name}</div>

        <div class="row">
            <input placeholder="總重" value="${d.weight||""}" 
                oninput="update(${i},'weight',this.value)">
            <input placeholder="件數" value="${d.count||""}" 
                oninput="update(${i},'count',this.value)">
            <input placeholder="棧板" value="${d.pallet||""}" 
                oninput="this.value=this.value.replace(/[^1]/g,'');update(${i},'pallet',this.value)">
        </div>

        <div>箱重：${item.tare}</div>
        <div class="result" id="result${i}">→ 實秤：0 kg</div>

        ${isCustom ? `<div class="delete-btn" onclick="deleteItem(${i})">🗑 刪除品項</div>` : ``}
        `;

        app.appendChild(div);
    });

    calcAll();
}

function update(i,key,val){
    if(!data[i]) data[i]={};
    data[i][key]=val;
    save();
    calcAll();
}

function calcAll(){
    items.forEach((item,i)=>{
        const d = data[i] || {};

        let result = (d.weight||0) - (item.tare*(d.count||0)) - ((d.pallet==1)?PALLET:0);
        if(result<0) result=0;

        document.getElementById("result"+i).innerText = "→ 實秤：" + result.toFixed(2) + " kg";

        const card = document.getElementById("card"+i);
        if(d.weight||d.count||d.pallet){
            card.classList.add("active");
        } else {
            card.classList.remove("active");
        }
    });
}

// ➕ 新增
function add(){
    const name = document.getElementById("name").value;
    const tare = parseFloat(document.getElementById("tare").value);

    if(!name||!tare) return alert("請填資料");

    const newItem = {name,tare};
    savedItems.push(newItem);
    items.push(newItem);

    save();
    render();

    document.getElementById("name").value="";
    document.getElementById("tare").value="";
}

// 🗑 刪除
function deleteItem(i){
    if(!confirm("確定刪除此品項？")) return;

    savedItems.splice(i - defaultItems.length,1);
    items.splice(i,1);
    delete data[i];

    save();
    render();
}

// 🗑 清空
function clearData(){
    if(!confirm("確定要清空全部資料？")) return;
    if(!confirm("⚠️ 無法復原，確定清空？")) return;

    data = {};
    save();
    render();
}

// 📋 複製
function copy(){
    let text="";
    items.forEach((item,i)=>{
        const d=data[i];
        if(!d||!d.count) return;

        let r=(d.weight||0)-(item.tare*d.count)-((d.pallet==1)?PALLET:0);
        if(r<0) r=0;

        text+=`${item.name}${d.count}件\n實秤:${r.toFixed(2)}kg\n\n`;
    });

    navigator.clipboard.writeText(text);
    alert("已複製");
}

render();

</script>

</body>
</html>
