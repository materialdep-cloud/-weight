<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>重量扣重計算</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; padding: 10px; background: #f5f5f5; }
h2 { text-align: center; }

table { width: 100%; border-collapse: collapse; background: white; }
th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }

input {
    width: 70px;
    padding: 6px;
    font-size: 16px;
}

.result { font-weight: bold; }
.item { text-align: left; }

button {
    margin-top: 10px;
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
}

.add-box {
    background: white;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #ddd;
}

/* ✅ 有輸入變灰 */
.row-active {
    background-color: #e0e0e0;
}
</style>
</head>

<body>

<h2>📦 重量扣重計算</h2>

<table>
<tr>
<th>品項</th>
<th>總重kg</th>
<th>件數</th>
<th>綠園板8.2kg</th>
<th>箱重kg / 籃重kg</th>
<th>實秤kg</th>
</tr>

<tbody id="tableBody"></tbody>
</table>

<!-- ➕ 新增品項（已移到底） -->
<div class="add-box">
    品名 <input id="newName">
    箱重 <input id="newTare" type="number" step="0.01">
    圖示 <input id="newIcon" placeholder="可空">
    <button onclick="addItem()">➕ 新增品項</button>
</div>

<button onclick="copyText()">📋 一鍵複製</button>

<script>

const PALLET_WEIGHT = 8.2;

let items = [
{name:"歐式生菜", icon:"🥬✨", tare:1.8},
{name:"日本山藥(無填充物)", icon:"🥔", tare:0.73},
{name:"豆苗", icon:"🌿", tare:1.2},
{name:"苜蓿", icon:"🌱", tare:0.89},
{name:"興家洋菇", icon:"🍄", tare:0.65},
{name:"本產美生菜", icon:"🥬", tare:1.45},
{name:"本產蘿美(牛皮紙箱)", icon:"🥬", tare:1.51},
{name:"本產蘿美(白箱)", icon:"🥬", tare:1.42},
{name:"進口美生菜", icon:"📦🥬", tare:1.22},
{name:"進口蘿美(大包)", icon:"📦🥬", tare:1.06},
{name:"進口蘿美(小包)", icon:"📦🥬", tare:1.51},
{name:"小黃瓜/番茄黑苔", icon:"🥒🍅", tare:1.55},
{name:"辣椒", icon:"🌶️", tare:1.2},
{name:"櫛瓜", icon:"🥒", tare:0.84},
{name:"日本紅春香地瓜", icon:"🍠", tare:0.45},
{name:"日本大蔥", icon:"🧅", tare:0.45}
];

const tbody = document.getElementById("tableBody");

// 建立表格
function renderTable() {
    tbody.innerHTML = "";

    items.forEach((item, i) => {
        tbody.insertAdjacentHTML("beforeend", `
        <tr id="row${i}">
            <td class="item">${item.icon || ""} ${item.name}</td>
            <td><input type="number" id="weight${i}" oninput="calc()" onfocus="this.select()"></td>
            <td><input type="number" id="count${i}" oninput="calc()" onfocus="this.select()"></td>
            <td><input type="number" id="palletFlag${i}" oninput="this.value=this.value.replace(/[^1]/g,''); calc();" onfocus="this.select()"></td>
            <td>${item.tare}</td>
            <td class="result" id="result${i}">0.00</td>
        </tr>
        `);
    });
}

// 新增品項
function addItem() {
    const name = document.getElementById("newName").value;
    const tare = parseFloat(document.getElementById("newTare").value);
    const icon = document.getElementById("newIcon").value;

    if (!name || isNaN(tare)) {
        alert("請輸入品名與箱重");
        return;
    }

    items.push({ name, tare, icon });

    renderTable();

    document.getElementById("newName").value = "";
    document.getElementById("newTare").value = "";
    document.getElementById("newIcon").value = "";
}

// 計算 + 變灰
function calc() {
    items.forEach((item, i) => {
        let weight = parseFloat(document.getElementById("weight"+i).value) || 0;
        let count = parseInt(document.getElementById("count"+i).value) || 0;
        let palletFlag = parseInt(document.getElementById("palletFlag"+i).value) || 0;

        let result = weight - (item.tare * count) - (palletFlag === 1 ? PALLET_WEIGHT : 0);
        if (result < 0) result = 0;

        const el = document.getElementById("result"+i);
        el.innerText = result.toFixed(2);
        el.style.color = result <= 0 ? "#999" : "green";

        // ✅ 反灰判斷
        const row = document.getElementById("row"+i);
        if (weight || count || palletFlag) {
            row.classList.add("row-active");
        } else {
            row.classList.remove("row-active");
        }
    });
}

// 複製
function copyText() {
    let output = "";

    items.forEach((item, i) => {
        let weight = parseFloat(document.getElementById("weight"+i).value);
        let count = parseInt(document.getElementById("count"+i).value);
        let palletFlag = parseInt(document.getElementById("palletFlag"+i).value) || 0;

        if (!count) return;

        let result = weight - (item.tare * count) - (palletFlag === 1 ? PALLET_WEIGHT : 0);
        if (result < 0) result = 0;

        output += `${item.name}${count}件\n`;
        output += `實秤：${weight} - (${item.tare}×${count})`;
        if (palletFlag === 1) output += ` - ${PALLET_WEIGHT}(綠園板)`;
        output += ` = ${result.toFixed(2)}kg\n\n`;
    });

    if (!output) {
        alert("沒有可複製資料");
        return;
    }

    navigator.clipboard.writeText(output);
    alert("已複製！");
}

// 初始化
renderTable();

</script>

</body>
</html>
