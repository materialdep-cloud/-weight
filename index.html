<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>重量扣重計算</title>

<style>
body { margin:0; font-family:Arial; background:#f0f2f5; }
.header { background:#2e7d32; color:#fff; padding:15px; text-align:center; font-size:20px; }
.container { padding:10px; }

.card {
    background:#fff;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card.active { background:#c8e6c9; }
.card.error { background:#c62828; color:#fff; }

.title { font-size:18px; margin-bottom:5px; }

.row {
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    margin-bottom:5px;
}
.row input {
    flex:1 1 45%;
    min-width:120px;
}

@media (max-width:600px){
    .row input { flex:1 1 100%; }
}

input { padding:6px; font-size:16px; }

.result {
    font-size:22px;
    font-weight:bold;
}

.warning {
    color:#ffeb3b;
    font-size:16px;
    margin-left:5px;
}

.delete-btn {
    color:#ff5252;
    margin-top:5px;
}

.add-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin:10px;
}

.fab-copy, .fab-clear{
    position:fixed;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:24px;
}

.fab-copy { bottom:90px; background:#2e7d32; }
.fab-clear { bottom:20px; background:#d32f2f; }
</style>
</head>

<body>

<div class="header">📦 重量扣重計算</div>

<div style="padding:10px;">
    <input 
        id="search"
        placeholder="🔍 搜尋品名..."
        style="width:100%;padding:8px;font-size:16px;"
        oninput="render()"
    >
</div>

<div class="container" id="app"></div>

<div class="add-box">
    品名 <input id="name">
    箱/籃重 <input id="tare" type="number">
    <button onclick="add()">➕新增</button>
</div>

<div class="fab-copy" onclick="copy()">📋</div>
<div class="fab-clear" onclick="clearData()">🗑</div>

<script>

const PALLET = 8.2;

function createItem(name, tare, icon=""){
    return {
        id: crypto.randomUUID(),
        name,
        tare,
        icon
    };
}

let defaultItems = [
createItem("歐式生菜",1.8,"🥬✨"),
createItem("日本山藥(無填充物)",0.73,"🥔"),
createItem("豆苗",1.2,"🌿"),
createItem("苜蓿",0.89,"🌱"),
createItem("興家洋菇",0.65,"🍄"),
createItem("本產美生菜",1.45,"🥬"),
createItem("本產蘿美(牛皮紙箱)",1.51,"🥬"),
createItem("本產蘿美(白箱)",1.42,"🥬"),
createItem("進口美生菜",1.22,"📦🥬"),
createItem("進口蘿美(大包)",1.06,"📦🥬"),
createItem("進口蘿美(小包)",1.51,"📦🥬"),
createItem("小黃瓜/番茄黑苔",1.55,"🥒🍅"),
createItem("辣椒",1.2,"🌶️"),
createItem("櫛瓜",0.84,"🥒"),
createItem("日本紅春香地瓜",0.45,"🍠"),
createItem("日本大蔥",0.45,"🧅"),
createItem("阿成南瓜(藍苔)",2.38,"🎃"),
createItem("栗子南瓜(家福苔)",3.13,"🌰🎃")
];

let savedItems = JSON.parse(localStorage.getItem("customItems")) || [];
let items = [...defaultItems, ...savedItems];
let data = JSON.parse(localStorage.getItem("data")) || {};

function save(){
    localStorage.setItem("customItems", JSON.stringify(savedItems));
    localStorage.setItem("data", JSON.stringify(data));
}

// 🔍 模糊搜尋（任意字匹配）
function fuzzyMatch(name, keyword){
    name = name.toLowerCase();
    keyword = keyword.toLowerCase().replace(/\s+/g,"");

    let i = 0;
    for(let char of name){
        if(char === keyword[i]) i++;
        if(i === keyword.length) return true;
    }
    return keyword === "" ? true : false;
}

function render(){
    const app = document.getElementById("app");
    app.innerHTML = "";

    const keyword = document.getElementById("search")?.value || "";

    items
    .filter(item => fuzzyMatch(item.name, keyword))
    .forEach((item)=>{

        const d = data[item.id] || {};
        let isCustom = savedItems.find(x=>x.id===item.id);

        const div = document.createElement("div");
        div.className = "card";
        div.id = "card"+item.id;

        div.innerHTML = `
        <div class="title">${item.icon||""} ${item.name}</div>

        <div class="row">
            <input type="number" min="0.0001" step="any"
                placeholder="總重" value="${d.weight||""}"
                oninput="update('${item.id}','weight',this.value)">
                
            <input type="number" min="1" step="1"
                placeholder="件數" value="${d.count||""}"
                oninput="update('${item.id}','count',this.value)">
        </div>

        <label>
            <input type="checkbox"
                ${d.pallet==1 ? "checked" : ""}
                onchange="update('${item.id}','pallet',this.checked?1:0)">
            棧板1塊
        </label>

        <div>箱/籃重：${item.tare}</div>
        <div class="result" id="result${item.id}"></div>

        ${isCustom ? `<div class="delete-btn" onclick="deleteItem('${item.id}')">🗑 刪除品項</div>` : ``}
        `;

        app.appendChild(div);
    });

    calcAll();
}

function update(id,key,val){

    if(key==="weight" || key==="count"){

        let num = parseFloat(val);

        if(key==="count"){
            num = Math.floor(num);
        }

        if(num <= 0 || isNaN(num)){
            val = "";
        }else{
            val = num;
        }
    }

    if(!data[id]) data[id]={};
    data[id][key]=val;

    save();
    calcAll();
}

function calcAll(){
    items.forEach((item)=>{

        const d = data[item.id] || {};

        let hasWeight = d.weight !== undefined && d.weight !== "";
        let hasCount = d.count !== undefined && d.count !== "";

        let weight = parseFloat(d.weight) || 0;
        let count = parseFloat(d.count) || 0;
        let pallet = (d.pallet==1)?PALLET:0;

        let deduction = (item.tare*count)+pallet;
        let result = weight - deduction;

        let invalidPair = (hasWeight && !hasCount) || (!hasWeight && hasCount);
        let warning = weight < deduction || invalidPair;

        if(result<0) result=0;

        let extra = "";
        if(["苜蓿","豆苗"].includes(item.name)){
            extra = `（${(result/0.6).toFixed(2)} 台斤）`;
        }

        const el = document.getElementById("result"+item.id);
        const card = document.getElementById("card"+item.id);

        if(!el || !card) return;

        if(invalidPair){
            el.innerHTML = `⚠️ 總重與件數需同時輸入`;
        }else{
            el.innerHTML = `→ 實秤：${result.toFixed(2)} kg ${extra} ${warning?'<span class="warning">⚠️重量異常</span>':''}`;
        }

        card.classList.remove("active","error");

        if(hasWeight || hasCount || d.pallet){
            if(warning){
                card.classList.add("error");
            }else{
                card.classList.add("active");
            }
        }
    });
}

function add(){
    const name = document.getElementById("name");
    const tare = document.getElementById("tare");

    if(!name.value.trim()){
        alert("請輸入品名");
        return;
    }
    if(!tare.value || tare.value<=0){
        alert("請輸入正確重量");
        return;
    }

    const newItem = createItem(name.value, parseFloat(tare.value));
    savedItems.push(newItem);
    items.push(newItem);

    save();
    render();

    name.value="";
    tare.value="";
}

function deleteItem(id){
    if(!confirm("確定刪除此品項？")) return;

    savedItems = savedItems.filter(x=>x.id!=id);
    items = items.filter(x=>x.id!=id);
    delete data[id];

    // 👉 清空搜尋（恢復全部顯示）
    document.getElementById("search").value = "";

    save();
    render();
}

function clearData(){
    if(!confirm("確定要清空全部資料？")) return;
    if(!confirm("⚠️ 無法復原，確定清空？")) return;

    data = {};
    save();
    render();
}

function copy(){
    let text="";

    items.forEach((item)=>{
        const d=data[item.id];
        if(!d||!d.count) return;

        let weight=parseFloat(d.weight)||0;
        let count=parseFloat(d.count)||0;
        let pallet=(d.pallet==1)?PALLET:0;

        let result=weight-(item.tare*count)-pallet;
        if(result<0) result=0;

        text+=`${item.name}${count}件\n`;
        text+=`實秤：${weight} - (${item.tare}×${count})`;

        if(pallet){
            text+=` - ${PALLET}`;
        }

        text+=` = ${result.toFixed(2)}kg\n\n`;
    });

    if(!text){
        alert("沒有可複製資料");
        return;
    }

    navigator.clipboard.writeText(text);
    alert("已複製");
}

render();

</script>

</body>
</html>
