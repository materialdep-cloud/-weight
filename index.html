<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>重量扣重計算</title>

<style>
body { margin:0; font-family:Arial; background:#f0f2f5; }
.header { background:#2e7d32; color:#fff; padding:15px; text-align:center; font-size:20px; }
.container { padding:10px; }

.card {
    background:#fff;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card.active { background:#c8e6c9; }
.card.error { background:#c62828; color:#fff; }

.title { font-size:18px; margin-bottom:5px; }

.row {
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    margin-bottom:5px;
}
.row input {
    flex:1 1 45%;
    min-width:120px;
}

@media (max-width:600px){
    .row input { flex:1 1 100%; }
}

input { padding:6px; font-size:16px; }

.result { font-size:22px; font-weight:bold; }

.warning { color:#ffeb3b; font-size:16px; margin-left:5px; }

.delete-btn { color:#ff5252; margin-top:5px; }

.add-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin:10px;
}

.pallet-group {
    display: flex;
    gap: 25px;
    margin: 8px 0;
}

.pallet-option {
    font-size: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.pallet-option input {
    transform: scale(1.6);
}

.fab-copy, .fab-clear{
    position:fixed;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:24px;
}

.fab-copy { bottom:90px; background:#2e7d32; }
.fab-clear { bottom:20px; background:#d32f2f; }

/* ⭐按鈕區優化 */
.top-btn-group{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin:10px;
}

.top-link-btn{
    display:flex;
    align-items:center;
    gap:6px;
    padding:10px 18px;
    font-size:16px;
    border-radius:12px;
    text-decoration:none;
    color:#fff;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    transition:0.2s;
}

/* 咖啡色 */
.top-link-btn.brown{
    background:#6d4c41;
}
.top-link-btn.brown:hover{
    background:#4e342e;
}

/* 藍色 */
.top-link-btn.blue{
    background:#1976d2;
}
.top-link-btn.blue:hover{
    background:#0d47a1;
}
</style>
</head>

<body>

<div class="header">📦 重量扣重計算</div>

<!-- ⭐按鈕區 -->
<div class="top-btn-group">
    <a href="https://materialdep-cloud.github.io/lettuce-calculator/" 
       target="_blank" 
       class="top-link-btn brown">
       🌱 邱薏芬(土耕)
    </a>

    <a href="https://materialdep-cloud.github.io/lettuce-calculator_-1/" 
       target="_blank" 
       class="top-link-btn blue">
       💧 川聖(水耕)
    </a>
</div>

<div style="padding:10px;">
    <input 
        id="search"
        placeholder="🔍 搜尋品名..."
        style="width:100%;padding:8px;font-size:16px;"
        oninput="render()"
    >
</div>

<div class="container" id="app"></div>

<div class="add-box">
    品名 <input id="name">
    箱/籃重 <input id="tare" type="number">
    <button onclick="add()">➕新增</button>
</div>

<div class="fab-copy" onclick="copy()">📋</div>
<div class="fab-clear" onclick="clearData()">🗑</div>

<script>

const PALLET = 8.2;

const STORAGE_DATA = "data_fixed_v1";
const STORAGE_ITEMS = "customItems_fixed_v1";

function createItem(name, tare, icon="", id=null){
    return {
        id: id || crypto.randomUUID(),
        name,
        tare,
        icon
    };
}

let defaultItems = [
createItem("歐式生菜(土耕-黑苔裝)",1.8,"🌱🥬","item1"),
createItem("歐式生菜(水耕-紙箱裝)",1.49,"💧🥬","item20"),
createItem("日本山藥(無填充物)",0.73,"🥔","item2"),
createItem("小豆苗",1.2,"🌿","item3"),
createItem("苜蓿",0.89,"🌱","item4"),
createItem("興家洋菇",0.65,"🍄","item5"),
createItem("本產美生菜",1.45,"🥬","item6"),
createItem("本產蘿美(牛皮紙箱)",1.51,"🥬","item7"),
createItem("本產蘿美(白箱)",1.42,"🥬","item8"),
createItem("進口美生菜",1.22,"📦🥬","item9"),
createItem("進口蘿美(大包)",1.06,"📦🥬","item10"),
createItem("進口蘿美(小包)",1.51,"📦🥬","item11"),
createItem("小黃瓜/番茄黑苔",1.55,"🥒🍅","item12"),
createItem("紫高麗菜",1.22,"🟣🥬","item13"),
createItem("辣椒",1.2,"🌶️","item14"),
createItem("櫛瓜",0.84,"🥒","item15"),
createItem("日本紅春香地瓜",0.45,"🍠","item16"),
createItem("日本大蔥",0.45,"🧅","item17"),
createItem("阿成南瓜(藍苔)",2.38,"🎃","item18"),
createItem("栗子南瓜(家福苔)",3.13,"🌰🎃","item19")
];

let savedItems = JSON.parse(localStorage.getItem(STORAGE_ITEMS)) || [];
let items = [...defaultItems, ...savedItems];
let data = JSON.parse(localStorage.getItem(STORAGE_DATA)) || {};

function save(){
    localStorage.setItem(STORAGE_ITEMS, JSON.stringify(savedItems));
    localStorage.setItem(STORAGE_DATA, JSON.stringify(data));
}

window.addEventListener("beforeunload", save);

function fuzzyMatch(name, keyword){
    name = name.toLowerCase();
    keyword = keyword.toLowerCase().replace(/\s+/g,"");

    let i = 0;
    for(let char of name){
        if(char === keyword[i]) i++;
        if(i === keyword.length) return true;
    }
    return keyword === "" ? true : false;
}

function render(){
    const app = document.getElementById("app");
    app.innerHTML = "";

    const keyword = document.getElementById("search")?.value || "";

    items
    .filter(item => fuzzyMatch(item.name, keyword))
    .forEach((item)=>{

        const d = data[item.id] || {};
        let isCustom = savedItems.find(x=>x.id===item.id);

        const div = document.createElement("div");
        div.className = "card";
        div.id = "card"+item.id;

        div.innerHTML = `
        <div class="title">${item.icon||""} ${item.name}</div>

        <div class="row">
            <input type="number" min="0.0001" step="any"
                placeholder="總重" value="${d.weight||""}"
                oninput="update('${item.id}','weight',this.value)">
                
            <input type="number" min="1" step="1"
                placeholder="件數" value="${d.count||""}"
                oninput="update('${item.id}','count',this.value)">
        </div>

        <div class="pallet-group">
            <label class="pallet-option">
                <input type="radio" name="pallet-${item.id}"
                    ${d.pallet==0 || d.pallet===undefined ? "checked" : ""}
                    onchange="update('${item.id}','pallet',0)">
                綠園板 0 塊
            </label>

            <label class="pallet-option">
                <input type="radio" name="pallet-${item.id}"
                    ${d.pallet==1 ? "checked" : ""}
                    onchange="update('${item.id}','pallet',1)">
                綠園板 1 塊
            </label>
        </div>

        <div>箱/籃重：${item.tare}</div>
        <div class="result" id="result${item.id}"></div>

        ${isCustom ? `<div class="delete-btn" onclick="deleteItem('${item.id}')">🗑 刪除品項</div>` : ``}
        `;

        app.appendChild(div);
    });

    calcAll();
}

function update(id,key,val){
    if(key==="weight" || key==="count"){
        let num = parseFloat(val);
        if(key==="count") num = Math.floor(num);

        if(num <= 0 || isNaN(num)){
            val = "";
        }else{
            val = num;
        }
    }

    if(!data[id]) data[id]={};
    data[id][key]=val;

    save();
    calcAll();
}

function calcAll(){
    items.forEach((item)=>{
        const d = data[item.id] || {};

        let hasWeight = d.weight !== undefined && d.weight !== "";
        let hasCount = d.count !== undefined && d.count !== "";

        let weight = parseFloat(d.weight) || 0;
        let count = parseFloat(d.count) || 0;
        let pallet = (d.pallet==1)?PALLET:0;

        let deduction = (item.tare*count)+pallet;
        let result = weight - deduction;

        let invalidPair = (hasWeight && !hasCount) || (!hasWeight && hasCount);
        let warning = weight < deduction || invalidPair;

        if(result<0) result=0;

        const el = document.getElementById("result"+item.id);
        const card = document.getElementById("card"+item.id);

        if(!el || !card) return;

        if(invalidPair){
            el.innerHTML = `⚠️ 總重與件數需同時輸入`;
        }else{
           let jinText = "";

         // ⭐只有這兩個品項顯示台斤
         if(item.name.includes("小豆苗") || item.name.includes("苜蓿")){
         let jin = result / 0.6;
         jinText = ` (${jin.toFixed(2)}台斤)`;
         }

         el.innerHTML = `→ 實秤：${result.toFixed(2)} kg${jinText}             ${warning?'<span class="warning">⚠️重量異常</span>':''}`;
        }

        card.classList.remove("active","error");

        if(hasWeight || hasCount || d.pallet!==undefined){
            if(warning){
                card.classList.add("error");
            }else{
                card.classList.add("active");
            }
        }
    });
}

function clearData(){
    if(!confirm("確定要清空全部資料？")) return;
    if(!confirm("⚠️ 無法復原，確定清空？")) return;

    data = {};
    localStorage.removeItem(STORAGE_DATA);
    save();
    render();
}

function checkLastData(){
    let hasData = Object.values(data).some(d => 
        d && (d.weight || d.count || d.pallet !== undefined)
    );

    if(hasData){
        setTimeout(()=>{
            alert("⚠️ 上次有未清除的資料，已自動幫你載入！");
        }, 300);
    }
}

function copy(){
    let text="";

    items.forEach((item)=>{
        const d=data[item.id];
        if(!d||!d.count) return;

        let weight=parseFloat(d.weight)||0;
        let count=parseFloat(d.count)||0;
        let pallet=(d.pallet==1)?PALLET:0;

        let result=weight-(item.tare*count)-pallet;
        if(result<0) result=0;

        text+=`${item.name}${count}件\n`;
        text+=`實秤：${weight} - (${item.tare}×${count})`;

        if(pallet){
            text+=` - ${PALLET}`;
        }

        text+=` = ${result.toFixed(2)}kg\n\n`;
    });

    if(!text){
        alert("沒有可複製資料");
        return;
    }

    navigator.clipboard.writeText(text);
    alert("已複製");
}

render();
checkLastData();

</script>

</body>
</html>
