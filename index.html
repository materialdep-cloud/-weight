<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>重量扣重計算</title>

<style>
body { margin:0; font-family:Arial; background:#f0f2f5; }
.header { background:#2e7d32; color:#fff; padding:15px; text-align:center; font-size:20px; }
.container { padding:10px; }

.card {
    background:#fff;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card.active {
    background:#c8e6c9;
    color:#000;
}

.card.error {
    background:#c62828;
    color:#fff;
}

.title { font-size:18px; margin-bottom:5px; }

.row {
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    margin-bottom:5px;
}
.row input {
    flex:1 1 45%;
    min-width:120px;
}

@media (max-width:600px){
    .row input { flex:1 1 100%; }
}

input { padding:6px; font-size:16px; }

.result {
    font-size:22px;
    font-weight:bold;
    color:#000;
}

.warning {
    color:#ffeb3b;
    font-size:16px;
    margin-left:5px;
}

.delete-btn {
    color:#ff5252;
    margin-top:5px;
}

.add-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin:10px;
}

.fab-copy, .fab-clear{
    position:fixed;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:24px;
}

.fab-copy { bottom:90px; background:#2e7d32; }
.fab-clear { bottom:20px; background:#d32f2f; }

</style>
</head>

<body>

<div class="header">📦 重量扣重計算</div>
<div class="container" id="app"></div>

<div class="add-box">
    品名 <input id="name">
    箱/藍重 <input id="tare" type="number">
    <button onclick="add()">➕新增</button>
</div>

<div class="fab-copy" onclick="copy()">📋</div>
<div class="fab-clear" onclick="clearData()">🗑</div>

<script>

const PALLET = 8.2;

function createItem(name, tare, icon=""){
    return {
        id: Date.now() + Math.random(),
        name,
        tare,
        icon
    };
}

let defaultItems = [
createItem("歐式生菜",1.8,"🥬✨"),
createItem("日本山藥(無填充物)",0.73,"🥔"),
createItem("豆苗",1.2,"🌿"),
createItem("苜蓿",0.89,"🌱"),
createItem("興家洋菇",0.65,"🍄"),
createItem("本產美生菜",1.45,"🥬"),
createItem("本產蘿美(牛皮紙箱)",1.51,"🥬"),
createItem("本產蘿美(白箱)",1.42,"🥬"),
createItem("進口美生菜",1.22,"📦🥬"),
createItem("進口蘿美(大包)",1.06,"📦🥬"),
createItem("進口蘿美(小包)",1.51,"📦🥬"),
createItem("小黃瓜/番茄黑苔",1.55,"🥒🍅"),
createItem("辣椒",1.2,"🌶️"),
createItem("櫛瓜",0.84,"🥒"),
createItem("日本紅春香地瓜",0.45,"🍠"),
createItem("日本大蔥",0.45,"🧅"),

/* 🆕 新增 */
createItem("阿成南瓜(藍苔)",2.38,"🎃"),
createItem("栗子南瓜(家福苔)",3.13,"🌰🎃")
];

let savedItems = JSON.parse(localStorage.getItem("customItems")) || [];
let items = [...defaultItems, ...savedItems];
let data = JSON.parse(localStorage.getItem("data")) || {};

function save(){
    localStorage.setItem("customItems", JSON.stringify(savedItems));
    localStorage.setItem("data", JSON.stringify(data));
}

function render(){
    const app = document.getElementById("app");
    app.innerHTML = "";

    items.forEach((item)=>{
        const d = data[item.id] || {};
        let isCustom = savedItems.find(x=>x.id===item.id);

        const div = document.createElement("div");
        div.className = "card";
        div.id = "card"+item.id;

        div.innerHTML = `
        <div class="title">${item.icon||""} ${item.name}</div>

        <div class="row">
            <input type="number" placeholder="總重" value="${d.weight||""}" oninput="update('${item.id}','weight',this.value)">
            <input type="number" placeholder="件數" value="${d.count||""}" oninput="update('${item.id}','count',this.value)">
            <input placeholder="棧板" value="${d.pallet||""}" oninput="this.value=this.value.replace(/[^1]/g,'');update('${item.id}','pallet',this.value)">
        </div>

        <div>箱重：${item.tare}</div>
        <div class="result" id="result${item.id}"></div>

        ${isCustom ? `<div class="delete-btn" onclick="deleteItem('${item.id}')">🗑 刪除品項</div>` : ``}
        `;

        app.appendChild(div);
    });

    calcAll();
}

function update(id,key,val){
    if(!data[id]) data[id]={};
    data[id][key]=val;
    save();
    calcAll();
}

function calcAll(){
    items.forEach((item)=>{
        const d = data[item.id] || {};

        let weight = parseFloat(d.weight) || 0;
        let count = parseFloat(d.count) || 0;
        let pallet = (d.pallet==1)?PALLET:0;

        let deduction = (item.tare*count)+pallet;
        let result = weight - deduction;
        if(result<0) result=0;

        let warning = weight < deduction;

        let extra = "";
        if(["苜蓿","豆苗"].includes(item.name)){
            extra = `（${(result/0.6).toFixed(2)} 台斤）`;
        }

        const el = document.getElementById("result"+item.id);
        el.innerHTML = `→ 實秤：${result.toFixed(2)} kg ${extra} ${warning?'<span class="warning">⚠️重量異常</span>':''}`;

        const card = document.getElementById("card"+item.id);

        card.classList.remove("active","error");

        if(d.weight||d.count||d.pallet){
            if(warning){
                card.classList.add("error");
            }else{
                card.classList.add("active");
            }
        }
    });
}

function add(){
    const name = document.getElementById("name");
    const tare = document.getElementById("tare");

    if(!name.value||!tare.value) return alert("請填資料");

    const newItem = createItem(name.value, parseFloat(tare.value));
    savedItems.push(newItem);
    items.push(newItem);

    save();
    render();

    name.value="";
    tare.value="";
}

function deleteItem(id){
    if(!confirm("確定刪除此品項？")) return;

    savedItems = savedItems.filter(x=>x.id!=id);
    items = items.filter(x=>x.id!=id);
    delete data[id];

    save();
    render();
}

function clearData(){
    if(!confirm("確定要清空全部資料？")) return;
    if(!confirm("⚠️ 無法復原，確定清空？")) return;

    data = {};
    save();
    render();
}

function copy(){
    let text="";

    items.forEach((item)=>{
        const d=data[item.id];
        if(!d||!d.count) return;

        let weight=parseFloat(d.weight)||0;
        let count=parseFloat(d.count)||0;
        let pallet=(d.pallet==1)?PALLET:0;

        let result=weight-(item.tare*count)-pallet;
        if(result<0) result=0;

        text+=`${item.name}${count}件\n`;
        text+=`實秤：${weight}(總重)`;
        text+=` - (${item.tare}×${count} 箱/藍重)`;

        if(pallet){
            text+=` - ${PALLET}(棧板)`;
        }

        text+=` = ${result.toFixed(2)}kg`;

        if(["苜蓿","豆苗"].includes(item.name)){
            text+=`（${(result/0.6).toFixed(2)} 台斤）`;
        }

        text+=`\n\n`;
    });

    if(!text){
        alert("沒有可複製資料");
        return;
    }

    navigator.clipboard.writeText(text);
    alert("已複製");
}

render();

</script>

</body>
</html>
