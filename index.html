<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>重量扣重計算</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f0f2f5;
}

.header {
    background: #2e7d32;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.container {
    padding: 10px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card.active {
    background: #e0e0e0;
}

.title {
    font-size: 18px;
    margin-bottom: 8px;
}

.row {
    display: flex;
    gap: 5px;
    margin-bottom: 5px;
}

input {
    flex: 1;
    padding: 6px;
    font-size: 16px;
}

.result {
    color: green;
    font-weight: bold;
}

.add-box {
    background: white;
    padding: 10px;
    border-radius: 10px;
}

.fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    background: #2e7d32;
    color: white;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    font-size: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
}
</style>
</head>

<body>

<div class="header">📦 重量扣重計算</div>

<div class="container" id="app"></div>

<div class="add-box">
    品名 <input id="name">
    箱重 <input id="tare" type="number">
    <button onclick="add()">➕新增</button>
</div>

<div class="fab" onclick="copy()">📋</div>

<script>
const PALLET = 8.2;

let items = JSON.parse(localStorage.getItem("items")) || [
{name:"歐式生菜", icon:"🥬✨", tare:1.8},
{name:"日本山藥", icon:"🥔", tare:0.73}
];

let data = JSON.parse(localStorage.getItem("data")) || {};

function save(){
    localStorage.setItem("items", JSON.stringify(items));
    localStorage.setItem("data", JSON.stringify(data));
}

function render(){
    const app = document.getElementById("app");
    app.innerHTML = "";

    items.forEach((item,i)=>{
        const d = data[i] || {};

        const div = document.createElement("div");
        div.className = "card " + (d.weight||d.count||d.pallet?"active":"");

        const result = (d.weight||0) - (item.tare*(d.count||0)) - ((d.pallet==1)?PALLET:0);

        div.innerHTML = `
        <div class="title">${item.icon||""} ${item.name}</div>

        <div class="row">
            <input placeholder="總重" value="${d.weight||""}" 
                oninput="update(${i},'weight',this.value)">
            <input placeholder="件數" value="${d.count||""}" 
                oninput="update(${i},'count',this.value)">
            <input placeholder="棧板" value="${d.pallet||""}" 
                oninput="this.value=this.value.replace(/[^1]/g,'');update(${i},'pallet',this.value)">
        </div>

        <div>箱重：${item.tare}</div>
        <div class="result">→ 實秤：${result>0?result.toFixed(2):0} kg</div>
        `;

        app.appendChild(div);
    });
}

function update(i,key,val){
    if(!data[i]) data[i]={};
    data[i][key]=val;
    save();
    render();
}

function add(){
    const name = document.getElementById("name").value;
    const tare = parseFloat(document.getElementById("tare").value);

    if(!name||!tare) return alert("填資料");

    items.push({name,tare});
    save();
    render();
}

function copy(){
    let text="";
    items.forEach((item,i)=>{
        const d=data[i];
        if(!d||!d.count) return;

        let r = (d.weight||0)-(item.tare*d.count)-((d.pallet==1)?PALLET:0);
        if(r<0) r=0;

        text+=`${item.name}${d.count}件\n實秤:${r.toFixed(2)}kg\n\n`;
    });

    navigator.clipboard.writeText(text);
    alert("已複製");
}

render();
</script>

</body>
</html>
